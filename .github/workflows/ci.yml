name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      CI: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile --config.confirmModulesPurge=false
      # Offline gate: core/sdk/cli test suites must pass with networking disabled.
      # `unshare -r -n` runs the tests in a network namespace with no interfaces
      # except loopback-less isolation (loopback is added for local-socket tests).
      - name: Offline tests (core, sdk, cli)
        run: |
          PNPM="$(command -v pnpm)"
          sudo -E unshare -n -- sh -c "export CI=true; ip link set lo up; cd \"$GITHUB_WORKSPACE\"; \"$PNPM\" --filter @hookkit-dev/core --filter @hookkit-dev/sdk --filter @hookkit-dev/cli test"
      - name: Full verify (lint + typecheck + test + build)
        run: pnpm verify
