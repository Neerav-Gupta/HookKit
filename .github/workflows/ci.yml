name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Offline gate: core/sdk/cli test suites must pass with networking disabled.
      # `unshare -r -n` runs the tests in a network namespace with no interfaces
      # except loopback-less isolation (loopback is added for local-socket tests).
      - name: Offline tests (core, sdk, cli)
        run: |
          sudo unshare -n -- sh -c 'ip link set lo up; su runner -c "cd $GITHUB_WORKSPACE && pnpm --filter @hookkit-dev/core --filter @hookkit-dev/sdk --filter @hookkit-dev/cli test"'
      - name: Full verify (lint + typecheck + test + build)
        run: pnpm verify
